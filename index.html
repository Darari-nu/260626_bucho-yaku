<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>横文字をわかりやすくする | darari</title>
    <meta name="description" content="文章に含まれる横文字を辞書で見つけて、わかる日本語に置き換える静的Webツールです。">
    <meta property="og:title" content="横文字をわかりやすくする">
    <meta property="og:description" content="横文字を、わかる日本語に。">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <noscript>
      <div class="noscript">このツールはブラウザ内のJavaScriptで動きます。JavaScriptを有効にしてから使ってください。</div>
    </noscript>

    <main class="app">
      <section class="hero" aria-labelledby="pageTitle">
        <p class="eyebrow">darariの横文字ほどき</p>
        <h1 id="pageTitle">横文字をわかりやすくする</h1>
        <p class="lead">横文字を、わかる日本語に。</p>
      </section>

      <section class="tool" aria-label="横文字置換ツール">
        <div class="input-panel paper-panel">
          <label class="textarea-label" for="sourceText">文章を貼る</label>
          <textarea id="sourceText" rows="9" placeholder="例：このプロジェクトはアジャイルでスケールします"></textarea>
          <p id="toolMessage" class="tool-message" role="status" aria-live="polite"></p>
        </div>

        <section id="resultSection" class="result-section paper-panel" aria-labelledby="resultTitle">
          <div class="result-head">
            <h2 id="resultTitle">変換後の文章</h2>
            <button id="copyButton" class="button button--secondary" type="button">コピー</button>
          </div>
          <div id="translatedText" class="text-output text-output--translated" aria-live="polite"></div>
          <p id="copyStatus" class="copy-status" role="status" aria-live="polite"></p>
        </section>
      </section>

      <section class="dictionary-strip paper-panel" aria-label="辞書">
        <p id="dictionaryCount">登録語数：0語</p>
        <button id="openDictionaryButton" class="button button--ghost" type="button">辞書を見る</button>
      </section>
    </main>

    <dialog id="dictionaryDialog" class="dictionary-dialog" aria-labelledby="dictionaryTitle">
      <div class="dialog-head">
        <div>
          <p class="eyebrow">darari辞書</p>
          <h2 id="dictionaryTitle">登録語を見る</h2>
        </div>
        <button id="closeDictionaryButton" class="icon-button" type="button" aria-label="辞書を閉じる">×</button>
      </div>

      <div class="dictionary-controls">
        <label class="search-label" for="dictionarySearch">検索</label>
        <input id="dictionarySearch" type="search" placeholder="例：KPI、アジャイル、クラウド">
        <div id="categoryFilters" class="filter-row" aria-label="カテゴリフィルタ"></div>
      </div>

      <div id="dictionaryGrid" class="dictionary-grid"></div>
    </dialog>

    <script src="./script.js" defer></script>
  </body>
</html>
