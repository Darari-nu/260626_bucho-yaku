<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" role="img" aria-labelledby="title">
  <title id="title">その会議、たぶん伝わってないが原因です。</title>
  <defs>
    <filter id="wiggle" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.026" numOctaves="2" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8"/>
    </filter>
  </defs>
  <path d="M34 10 C12 44, 16 128, 40 160" fill="none" stroke="#111719" stroke-width="3.5" stroke-linecap="round" filter="url(#wiggle)"/>
  <text x="76" y="44" font-family="Hiragino Maru Gothic ProN, Yu Gothic, sans-serif" font-size="27" font-weight="800" fill="#111719" filter="url(#wiggle)">その会議、</text>
  <text x="78" y="78" font-family="Hiragino Maru Gothic ProN, Yu Gothic, sans-serif" font-size="25" font-weight="800" fill="#111719" filter="url(#wiggle)">たぶん</text>
  <text x="80" y="113" font-family="Hiragino Maru Gothic ProN, Yu Gothic, sans-serif" font-size="26" font-weight="900" fill="#111719" filter="url(#wiggle)">“伝わってない”</text>
  <path d="M78 121 C120 116, 170 116, 230 112" fill="none" stroke="#d7332f" stroke-width="4.5" stroke-linecap="round" filter="url(#wiggle)"/>
  <text x="80" y="149" font-family="Hiragino Maru Gothic ProN, Yu Gothic, sans-serif" font-size="26" font-weight="800" fill="#111719" filter="url(#wiggle)">が原因です。</text>
</svg>
