<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 150" role="img" aria-labelledby="title">
  <title id="title">横文字をわかりやすくする</title>
  <defs>
    <filter id="markerInk" x="-3%" y="-15%" width="106%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text x="490" y="92"
        text-anchor="middle"
        font-family="Hiragino Sans, Yu Gothic, Noto Sans CJK JP, system-ui, sans-serif"
        font-size="78"
